<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>点一根</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0f;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
      overflow: hidden;
      user-select: none;
    }
    .counter-wrap {
      position: fixed; top: 44px; left: 50%; transform: translateX(-50%); text-align: center;
    }
    .counter-num {
      font-size: 76px; font-weight: 700; color: #fff; line-height: 1;
      transition: transform .15s ease;
    }
    .counter-num.bump { transform: scale(1.3); }
    .counter-label { font-size: 13px; color: rgba(255,255,255,.4); margin-top: 6px; letter-spacing: 3px; }

    .stage { position: relative; width: 300px; height: 360px; margin-top: 10px; }

    /* 打火机 */
    .lighter {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-60%);
      width: 70px; height: 130px; cursor: pointer;
      z-index: 1;
    }
    .lighter-body {
      position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 56px; height: 100px;
      background: linear-gradient(160deg, #e8c84a 0%, #c9a020 40%, #a07810 100%);
      border-radius: 10px 10px 14px 14px;
      box-shadow: inset -4px 0 8px rgba(0,0,0,.3), 0 4px 20px rgba(0,0,0,.5);
    }
    .lighter-body::after {
      content: ''; position: absolute; top: 10px; left: 7px; right: 7px; height: 26px;
      background: rgba(255,255,255,.12); border-radius: 5px;
    }
    .lighter-top {
      position: absolute; bottom: 98px; left: 50%; transform: translateX(-50%);
      width: 40px; height: 20px;
      background: linear-gradient(180deg, #888 0%, #555 100%);
      border-radius: 4px 4px 0 0;
    }
    .lighter-nozzle {
      position: absolute; bottom: 116px; left: 50%; transform: translateX(-50%);
      width: 12px; height: 10px; background: #333; border-radius: 3px 3px 0 0;
    }

    /*
      打火机：bottom:20px, left:50% translateX(-60%)
      lighter-nozzle: bottom:116px (相对lighter) → 相对stage: 20+116=136px
      nozzle高10px，顶部在 136+10=146px
      flame-wrap: bottom:126px, 高60px → 顶部在 126+60=186px
      flame底部贴nozzle顶部 ✓
    */
    .flame-wrap {
      position: absolute;
      bottom: 126px;
      left: 50%;
      transform: translateX(-60%);
      width: 36px; height: 60px;
      opacity: 0;
      transition: opacity .2s ease;
      z-index: 10; /* 必须在最上层 */
    }
    .flame-wrap.show { opacity: 1; }
    .flame {
      position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 26px; height: 54px;
      background: radial-gradient(ellipse at 50% 100%, #fff 0%, #ffe066 20%, #ff9900 50%, #ff4400 80%, transparent 100%);
      border-radius: 50% 50% 30% 30%;
      animation: flicker .1s infinite alternate; filter: blur(.5px);
    }
    .flame::after {
      content: ''; position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%);
      width: 12px; height: 26px;
      background: radial-gradient(ellipse at 50% 100%, #fff 0%, #ffe8a0 50%, transparent 100%);
      border-radius: 50% 50% 30% 30%;
    }
    @keyframes flicker {
      0%   { transform: translateX(-50%) scaleX(1)    scaleY(1)    skewX(0deg); }
      25%  { transform: translateX(-50%) scaleX(.9)   scaleY(1.05) skewX(3deg); }
      50%  { transform: translateX(-50%) scaleX(1.06) scaleY(.96)  skewX(-2deg); }
      75%  { transform: translateX(-50%) scaleX(.94)  scaleY(1.05) skewX(2deg); }
      100% { transform: translateX(-50%) scaleX(1.03) scaleY(1.02) skewX(-1deg); }
    }

    /*
      香烟烟头（左端 cx=6）需要对准火焰顶部：
      火焰顶部 = bottom:186px, left: 50% + translateX(-60%) 的中心 ≈ left:50% - 21px(half of 36px * 0.6偏移)
      
      cig-wrap: bottom=175px (烟头中心线对齐火焰顶部附近)
      left=50%, transform-origin=left center
      show状态: translateX(-24px) 让烟头左端(cx=6)对准火焰中心x
      rotate(-35deg) 斜向右上
      
      火焰中心x ≈ stage左50% + (-60%*36px/2) = 50% - ~11px
      cig-wrap left=50%, 烟头在svg x=6, 需要 translateX 让 x=6 对准火焰中心
    */
    .cig-wrap {
      position: absolute;
      bottom: 178px;
      left: 50%;
      transform-origin: left center;
      transform: translateX(120px) translateY(-80px) rotate(-35deg);
      opacity: 0;
      transition: transform .55s cubic-bezier(.22,1,.36,1), opacity .4s ease;
      width: 220px; height: 22px;
      pointer-events: none;
      z-index: 8;
    }
    .cig-wrap.show {
      opacity: 1;
      /* 
        打火机偏移 translateX(-60%) 对应 left:50% 时，打火机中心在 50% - 60%*70px/2 ≈ 50% - 21px
        喷嘴宽12px，中心在打火机中心
        火焰中心x = 50% - 21px
        cig-wrap left=50%, 烟头svg cx=6, 需要 translateX = -(50%偏移) + 火焰中心修正
        实测最佳值: translateX(-27px)
      */
      transform: translateX(-27px) translateY(0px) rotate(-35deg);
    }

    /* 烟雾跟随烟头位置 */
    .smoke-wrap {
      position: absolute;
      bottom: 190px;
      left: calc(50% - 27px);
      width: 44px; height: 80px;
      opacity: 0; transition: opacity .5s ease; pointer-events: none; z-index: 9;
    }
    .smoke-wrap.show { opacity: 1; }
    .sp {
      position: absolute; bottom: 0; border-radius: 50%;
      background: rgba(200,200,200,.4); animation: rise 2.4s ease-out infinite;
    }
    .sp:nth-child(1){width:10px;height:10px;left:12px;animation-delay:0s;}
    .sp:nth-child(2){width:15px;height:15px;left:20px;animation-delay:.5s;}
    .sp:nth-child(3){width:9px;height:9px;left:8px;animation-delay:1s;}
    .sp:nth-child(4){width:13px;height:13px;left:24px;animation-delay:1.6s;}
    @keyframes rise {
      0%   { transform: translateY(0) scale(.5); opacity: .55; }
      50%  { transform: translateY(-38px) translateX(7px) scale(1.4); opacity: .25; }
      100% { transform: translateY(-78px) translateX(-5px) scale(2.2); opacity: 0; }
    }

    .hint {
      position: fixed; bottom: 44px; left: 50%; transform: translateX(-50%);
      font-size: 13px; color: rgba(255,255,255,.3); letter-spacing: 1px;
      animation: pulse 2s ease-in-out infinite; white-space: nowrap;
    }
    @keyframes pulse { 0%,100%{opacity:.3;} 50%{opacity:.7;} }
    .ripple {
      position: fixed; border-radius: 50%; background: rgba(255,160,0,.25);
      transform: scale(0); animation: rpl .6s ease-out forwards; pointer-events: none;
    }
    @keyframes rpl { to { transform: scale(5); opacity: 0; } }
  </style>
</head>
<body>
  <div class="counter-wrap">
    <div class="counter-num" id="count">0</div>
    <div class="counter-label">今日已抽</div>
  </div>

  <div class="stage">
    <div class="smoke-wrap" id="smoke">
      <div class="sp"></div><div class="sp"></div><div class="sp"></div><div class="sp"></div>
    </div>

    <!-- 香烟：左=烟头(燃烧端)，右=滤嘴 -->
    <div class="cig-wrap" id="cig">
      <svg width="220" height="22" viewBox="0 0 220 22" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="6" cy="11" rx="6" ry="7" fill="#ff6600"/>
        <ellipse cx="7.5" cy="11" rx="4" ry="5" fill="#ff9900"/>
        <ellipse cx="9" cy="11" rx="2.5" ry="3" fill="#ffdd00"/>
        <rect x="12" y="4" width="162" height="14" rx="3" fill="url(#cg)"/>
        <line x1="58"  y1="4" x2="58"  y2="18" stroke="rgba(0,0,0,.06)" stroke-width=".8"/>
        <line x1="104" y1="4" x2="104" y2="18" stroke="rgba(0,0,0,.06)" stroke-width=".8"/>
        <line x1="148" y1="4" x2="148" y2="18" stroke="rgba(0,0,0,.06)" stroke-width=".8"/>
        <rect x="174" y="4" width="42" height="14" rx="3" fill="#c8845a"/>
        <rect x="174" y="4" width="3"  height="14" fill="#b07040"/>
        <rect x="12" y="5" width="162" height="3" rx="1.5" fill="rgba(255,255,255,.4)"/>
        <defs>
          <linearGradient id="cg" x1="0" y1="0" x2="0" y2="22" gradientUnits="userSpaceOnUse">
            <stop offset="0%"   stop-color="#f5f5f5"/>
            <stop offset="50%"  stop-color="#ffffff"/>
            <stop offset="100%" stop-color="#cccccc"/>
          </linearGradient>
        </defs>
      </svg>
    </div>

    <!-- 火焰：z-index:10，在最上层 -->
    <div class="flame-wrap" id="flame">
      <div class="flame"></div>
    </div>

    <div class="lighter" onclick="ignite(event)">
      <div class="lighter-nozzle"></div>
      <div class="lighter-top"></div>
      <div class="lighter-body"></div>
    </div>
  </div>

  <div class="hint" id="hint">点击打火机</div>

  <script>
    const KEY='cig_v4',KEY_DATE='cig_v4d';
    function getToday(){return new Date().toLocaleDateString('zh-CN');}
    function loadCount(){
      if(localStorage.getItem(KEY_DATE)!==getToday()){localStorage.setItem(KEY,'0');localStorage.setItem(KEY_DATE,getToday());}
      return parseInt(localStorage.getItem(KEY)||'0');
    }
    function saveCount(n){localStorage.setItem(KEY,String(n));localStorage.setItem(KEY_DATE,getToday());}
    let count=loadCount(),animating=false;
    const countEl=document.getElementById('count'),flameEl=document.getElementById('flame'),
          cigEl=document.getElementById('cig'),smokeEl=document.getElementById('smoke'),
          hintEl=document.getElementById('hint');
    countEl.textContent=count;
    function ignite(e){
      if(animating)return;animating=true;hintEl.style.opacity='0';
      const r=document.createElement('div');r.className='ripple';
      const s=60;r.style.cssText=`width:${s}px;height:${s}px;left:${e.clientX-s/2}px;top:${e.clientY-s/2}px`;
      document.body.appendChild(r);setTimeout(()=>r.remove(),700);
      flameEl.classList.add('show');
      setTimeout(()=>cigEl.classList.add('show'),300);
      setTimeout(()=>smokeEl.classList.add('show'),850);
      setTimeout(()=>{
        count++;saveCount(count);countEl.textContent=count;
        countEl.classList.add('bump');setTimeout(()=>countEl.classList.remove('bump'),200);
      },950);
      setTimeout(()=>{
        flameEl.classList.remove('show');cigEl.classList.remove('show');smokeEl.classList.remove('show');
        animating=false;hintEl.style.opacity='';
      },3000);
    }
  </script>
</body>
</html>
