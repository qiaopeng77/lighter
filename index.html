<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>点一根</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{
      background:#0d0d14;min-height:100vh;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;
      overflow:hidden;user-select:none;-webkit-tap-highlight-color:transparent;
    }
    .counter-wrap{position:fixed;top:44px;left:50%;transform:translateX(-50%);text-align:center;}
    .counter-num{font-size:76px;font-weight:700;color:#fff;line-height:1;transition:transform .15s ease;text-shadow:0 0 30px rgba(255,160,0,.3);}
    .counter-num.bump{transform:scale(1.25);}
    .counter-label{font-size:13px;color:rgba(255,255,255,.35);margin-top:6px;letter-spacing:3px;}

    .stage{position:relative;width:300px;height:400px;margin-top:10px;cursor:pointer;}

    /* ===== ZIPPO ===== */
    /* 整体容器，3D透视 */
    .zippo{
      position:absolute;bottom:30px;left:50%;transform:translateX(-50%);
      width:88px;height:150px;
      perspective:500px;
    }

    /* 底座 */
    .z-base{
      position:absolute;bottom:0;left:0;right:0;height:72px;
      background:linear-gradient(150deg,#b8922a 0%,#e0c060 35%,#c8a030 65%,#a07820 100%);
      border-radius:3px 3px 7px 7px;
      box-shadow:inset 2px 0 3px rgba(255,255,255,.2),inset -3px 0 5px rgba(0,0,0,.35),0 8px 28px rgba(0,0,0,.7);
    }
    .z-base::before{
      content:'';position:absolute;inset:0;border-radius:3px 3px 7px 7px;
      background:repeating-linear-gradient(45deg,transparent,transparent 5px,rgba(0,0,0,.06) 5px,rgba(0,0,0,.06) 6px),
                 repeating-linear-gradient(-45deg,transparent,transparent 5px,rgba(255,255,255,.04) 5px,rgba(255,255,255,.04) 6px);
    }
    /* 打火轮 */
    .z-wheel{
      position:absolute;top:-10px;right:-5px;
      width:16px;height:16px;
      background:repeating-conic-gradient(#999 0deg 18deg,#555 18deg 36deg);
      border-radius:50%;border:2px solid #444;
      box-shadow:0 2px 4px rgba(0,0,0,.5);
    }
    .z-wheel::after{content:'';position:absolute;inset:3px;background:#777;border-radius:50%;}

    /* 内胆 */
    .z-inner{
      position:absolute;bottom:70px;left:5px;right:5px;height:66px;
      background:linear-gradient(180deg,#1e1e1e 0%,#141414 100%);
      border-radius:3px 3px 0 0;overflow:hidden;
    }
    .z-wick{
      position:absolute;top:5px;left:50%;transform:translateX(-50%);
      width:7px;height:24px;
      background:linear-gradient(180deg,#999 0%,#555 100%);
      border-radius:2px 2px 0 0;
    }
    .z-holes{
      position:absolute;bottom:6px;left:50%;transform:translateX(-50%);
      display:flex;gap:4px;
    }
    .z-hole{width:5px;height:5px;border-radius:50%;background:#2a2a2a;box-shadow:inset 0 1px 2px rgba(0,0,0,.8);}

    /* 铰链 — 右侧 */
    .z-hinge{
      position:absolute;bottom:68px;right:0;
      width:6px;height:10px;
      background:linear-gradient(90deg,#888 0%,#aaa 50%,#666 100%);
      border-radius:0 2px 2px 0;
      z-index:10;
    }

    /* 盖子 — 绕右侧铰链向左翻开（rotateY） */
    .z-lid{
      position:absolute;bottom:70px;left:0;right:0;height:80px;
      background:linear-gradient(150deg,#c09030 0%,#e8c858 30%,#b88820 65%,#d4a838 100%);
      border-radius:7px 7px 3px 3px;
      box-shadow:inset 2px 0 3px rgba(255,255,255,.25),inset -3px 0 5px rgba(0,0,0,.25);
      transform-origin:right center;
      transform-style:preserve-3d;
      transition:transform .4s cubic-bezier(.4,0,.2,1);
      z-index:5;
    }
    .z-lid.open{transform:rotateY(-130deg);}
    /* 盖子高光 */
    .z-lid::after{
      content:'';position:absolute;top:6px;left:6px;right:6px;height:16px;
      background:linear-gradient(180deg,rgba(255,255,255,.22) 0%,transparent 100%);
      border-radius:4px;
    }
    /* 盖子几何纹 */
    .z-lid-svg{position:absolute;inset:0;border-radius:7px 7px 3px 3px;overflow:hidden;}

    /* 火焰 */
    .flame-wrap{
      position:absolute;bottom:140px;left:50%;transform:translateX(-50%);
      width:40px;height:72px;
      opacity:0;transition:opacity .25s ease;z-index:10;
    }
    .flame-wrap.show{opacity:1;}
    .flame{
      position:absolute;bottom:0;left:50%;transform:translateX(-50%);
      width:26px;height:60px;
      background:radial-gradient(ellipse at 50% 100%,#fff 0%,#ffe566 15%,#ffaa00 45%,#ff5500 78%,transparent 100%);
      border-radius:50% 50% 30% 30%;
      animation:flicker .1s infinite alternate;filter:blur(.5px);
    }
    .flame::after{
      content:'';position:absolute;bottom:4px;left:50%;transform:translateX(-50%);
      width:12px;height:26px;
      background:radial-gradient(ellipse at 50% 100%,#fff 0%,#ffe8a0 50%,transparent 100%);
      border-radius:50% 50% 30% 30%;
    }
    .flame-glow{
      position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);
      width:60px;height:60px;
      background:radial-gradient(ellipse,rgba(255,140,0,.45) 0%,transparent 70%);
      border-radius:50%;animation:glow-pulse .15s infinite alternate;
    }
    @keyframes glow-pulse{0%{transform:translateX(-50%) scale(.88);opacity:.6;}100%{transform:translateX(-50%) scale(1.12);opacity:1;}}
    @keyframes flicker{
      0%{transform:translateX(-50%) scaleX(1) scaleY(1) skewX(0deg);}
      25%{transform:translateX(-50%) scaleX(.88) scaleY(1.06) skewX(3deg);}
      50%{transform:translateX(-50%) scaleX(1.07) scaleY(.95) skewX(-2deg);}
      75%{transform:translateX(-50%) scaleX(.93) scaleY(1.05) skewX(2deg);}
      100%{transform:translateX(-50%) scaleX(1.04) scaleY(1.02) skewX(-1deg);}
    }

    /* 香烟 */
    .cig-wrap{
      position:absolute;bottom:155px;left:50%;
      transform-origin:left center;
      transform:translateX(90px) translateY(-60px) rotate(-35deg);
      opacity:0;
      transition:transform .55s cubic-bezier(.22,1,.36,1),opacity .4s ease;
      width:210px;height:22px;pointer-events:none;z-index:5;
    }
    .cig-wrap.show{opacity:1;transform:translateX(-16px) translateY(0) rotate(-35deg);}

    /* 烟雾 */
    .smoke-wrap{
      position:absolute;bottom:178px;left:calc(50% - 42px);
      width:44px;height:80px;
      opacity:0;transition:opacity .5s ease;pointer-events:none;z-index:6;
    }
    .smoke-wrap.show{opacity:1;}
    .sp{position:absolute;bottom:0;border-radius:50%;background:rgba(210,210,210,.4);animation:rise 2.4s ease-out infinite;}
    .sp:nth-child(1){width:10px;height:10px;left:12px;animation-delay:0s;}
    .sp:nth-child(2){width:15px;height:15px;left:20px;animation-delay:.5s;}
    .sp:nth-child(3){width:9px;height:9px;left:8px;animation-delay:1s;}
    .sp:nth-child(4){width:13px;height:13px;left:24px;animation-delay:1.6s;}
    @keyframes rise{
      0%{transform:translateY(0) scale(.5);opacity:.55;}
      50%{transform:translateY(-38px) translateX(7px) scale(1.4);opacity:.25;}
      100%{transform:translateY(-78px) translateX(-5px) scale(2.2);opacity:0;}
    }

    .hint{
      position:fixed;bottom:44px;left:50%;transform:translateX(-50%);
      font-size:13px;color:rgba(255,255,255,.28);letter-spacing:2px;
      animation:pulse 2.2s ease-in-out infinite;white-space:nowrap;
    }
    @keyframes pulse{0%,100%{opacity:.28;}50%{opacity:.65;}}
    .ripple{
      position:fixed;border-radius:50%;background:rgba(255,160,0,.2);
      transform:scale(0);animation:rpl .7s ease-out forwards;pointer-events:none;
    }
    @keyframes rpl{to{transform:scale(6);opacity:0;}}
  </style>
</head>
<body>
  <div class="counter-wrap">
    <div class="counter-num" id="count">0</div>
    <div class="counter-label">今日已抽</div>
  </div>

  <div class="stage" id="stage" onclick="ignite(event)">
    <div class="smoke-wrap" id="smoke">
      <div class="sp"></div><div class="sp"></div><div class="sp"></div><div class="sp"></div>
    </div>
    <div class="cig-wrap" id="cig">
      <svg width="210" height="22" viewBox="0 0 210 22" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="6" cy="11" rx="6" ry="7" fill="#ff6600"/>
        <ellipse cx="7.5" cy="11" rx="4" ry="5" fill="#ff9900"/>
        <ellipse cx="9" cy="11" rx="2.5" ry="3" fill="#ffdd00"/>
        <rect x="12" y="4" width="154" height="14" rx="3" fill="url(#cg)"/>
        <line x1="55" y1="4" x2="55" y2="18" stroke="rgba(0,0,0,.06)" stroke-width=".8"/>
        <line x1="98" y1="4" x2="98" y2="18" stroke="rgba(0,0,0,.06)" stroke-width=".8"/>
        <line x1="140" y1="4" x2="140" y2="18" stroke="rgba(0,0,0,.06)" stroke-width=".8"/>
        <rect x="166" y="4" width="40" height="14" rx="3" fill="#c8845a"/>
        <rect x="166" y="4" width="3" height="14" fill="#b07040"/>
        <rect x="12" y="5" width="154" height="3" rx="1.5" fill="rgba(255,255,255,.4)"/>
        <defs>
          <linearGradient id="cg" x1="0" y1="0" x2="0" y2="22" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#f5f5f5"/><stop offset="50%" stop-color="#fff"/><stop offset="100%" stop-color="#ccc"/>
          </linearGradient>
        </defs>
      </svg>
    </div>
    <div class="flame-wrap" id="flame">
      <div class="flame-glow"></div>
      <div class="flame"></div>
    </div>
    <div class="zippo">
      <div class="z-inner">
        <div class="z-wick"></div>
        <div class="z-holes">
          <div class="z-hole"></div><div class="z-hole"></div>
          <div class="z-hole"></div><div class="z-hole"></div>
        </div>
      </div>
      <div class="z-hinge"></div>
      <div class="z-lid" id="zlid">
        <div class="z-lid-svg">
          <svg viewBox="0 0 88 80" xmlns="http://www.w3.org/2000/svg" width="88" height="80">
            <rect x="6" y="6" width="76" height="68" rx="3" fill="none" stroke="rgba(255,255,255,.16)" stroke-width="1"/>
            <polygon points="44,14 70,40 44,66 18,40" fill="none" stroke="rgba(255,255,255,.2)" stroke-width="1.2"/>
            <polygon points="44,24 60,40 44,56 28,40" fill="none" stroke="rgba(255,255,255,.13)" stroke-width=".8"/>
            <polygon points="44,32 54,40 44,48 34,40" fill="none" stroke="rgba(255,255,255,.09)" stroke-width=".6"/>
            <line x1="6" y1="6" x2="18" y2="40" stroke="rgba(255,255,255,.07)" stroke-width=".6"/>
            <line x1="82" y1="6" x2="70" y2="40" stroke="rgba(255,255,255,.07)" stroke-width=".6"/>
            <line x1="6" y1="74" x2="18" y2="40" stroke="rgba(255,255,255,.07)" stroke-width=".6"/>
            <line x1="82" y1="74" x2="70" y2="40" stroke="rgba(255,255,255,.07)" stroke-width=".6"/>
            <rect x="8" y="8" width="6" height="6" fill="rgba(255,255,255,.1)" rx="1"/>
            <rect x="74" y="8" width="6" height="6" fill="rgba(255,255,255,.1)" rx="1"/>
            <rect x="8" y="66" width="6" height="6" fill="rgba(255,255,255,.1)" rx="1"/>
            <rect x="74" y="66" width="6" height="6" fill="rgba(255,255,255,.1)" rx="1"/>
            <circle cx="44" cy="40" r="5" fill="rgba(255,255,255,.18)"/>
            <circle cx="44" cy="40" r="2.5" fill="rgba(255,255,255,.32)"/>
          </svg>
        </div>
      </div>
      <div class="z-base">
        <div class="z-wheel"></div>
      </div>
    </div>
  </div>

  <div class="hint" id="hint">点击屏幕点火</div>

  <script>
    const KEY='cig_z3',KEY_DATE='cig_z3d';
    function getToday(){return new Date().toLocaleDateString('zh-CN');}
    function loadCount(){
      if(localStorage.getItem(KEY_DATE)!==getToday()){localStorage.setItem(KEY,'0');localStorage.setItem(KEY_DATE,getToday());}
      return parseInt(localStorage.getItem(KEY)||'0');
    }
    function saveCount(n){localStorage.setItem(KEY,String(n));localStorage.setItem(KEY_DATE,getToday());}
    let count=loadCount(),animating=false;
    const countEl=document.getElementById('count'),flameEl=document.getElementById('flame'),
          cigEl=document.getElementById('cig'),smokeEl=document.getElementById('smoke'),
          hintEl=document.getElementById('hint'),zlidEl=document.getElementById('zlid');
    countEl.textContent=count;
    function ignite(e){
      if(animating)return;animating=true;hintEl.style.opacity='0';
      const r=document.createElement('div');r.className='ripple';
      const s=60;r.style.cssText=`width:${s}px;height:${s}px;left:${e.clientX-s/2}px;top:${e.clientY-s/2}px`;
      document.body.appendChild(r);setTimeout(()=>r.remove(),800);
      zlidEl.classList.add('open');
      setTimeout(()=>flameEl.classList.add('show'),380);
      setTimeout(()=>cigEl.classList.add('show'),640);
      setTimeout(()=>smokeEl.classList.add('show'),1120);
      setTimeout(()=>{
        count++;saveCount(count);countEl.textContent=count;
        countEl.classList.add('bump');setTimeout(()=>countEl.classList.remove('bump'),200);
      },1220);
      setTimeout(()=>{
        cigEl.classList.remove('show');smokeEl.classList.remove('show');flameEl.classList.remove('show');
        setTimeout(()=>zlidEl.classList.remove('open'),220);
        animating=false;hintEl.style.opacity='';
      },3300);
    }
  </script>
</body>
</html>
