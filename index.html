<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>点一根</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0f;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
      overflow: hidden;
      user-select: none;
    }

    /* 计数器 */
    .counter-wrap {
      position: fixed;
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
    }
    .counter-num {
      font-size: 72px;
      font-weight: 700;
      color: #fff;
      line-height: 1;
      transition: transform 0.15s ease;
    }
    .counter-num.bump {
      transform: scale(1.3);
    }
    .counter-label {
      font-size: 14px;
      color: rgba(255,255,255,0.4);
      margin-top: 4px;
      letter-spacing: 2px;
    }

    /* 主舞台 */
    .stage {
      position: relative;
      width: 200px;
      height: 340px;
      margin-top: 20px;
    }

    /* 打火机 */
    .lighter {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 140px;
      cursor: pointer;
      transition: transform 0.1s ease;
    }
    .lighter:active { transform: translateX(-50%) scale(0.96); }

    .lighter-body {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 110px;
      background: linear-gradient(160deg, #e8c84a 0%, #c9a020 40%, #a07810 100%);
      border-radius: 10px 10px 14px 14px;
      box-shadow: inset -4px 0 8px rgba(0,0,0,0.3), 0 4px 20px rgba(0,0,0,0.5);
    }
    .lighter-body::after {
      content: '';
      position: absolute;
      top: 12px; left: 8px; right: 8px; height: 30px;
      background: rgba(255,255,255,0.12);
      border-radius: 6px;
    }
    .lighter-top {
      position: absolute;
      bottom: 108px;
      left: 50%;
      transform: translateX(-50%);
      width: 44px;
      height: 22px;
      background: linear-gradient(180deg, #888 0%, #555 100%);
      border-radius: 4px 4px 0 0;
    }
    .lighter-nozzle {
      position: absolute;
      bottom: 128px;
      left: 50%;
      transform: translateX(-50%);
      width: 14px;
      height: 10px;
      background: #333;
      border-radius: 3px 3px 0 0;
    }

    /* 火焰 */
    .flame-wrap {
      position: absolute;
      bottom: 136px;
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      height: 70px;
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    .flame-wrap.show { opacity: 1; }

    .flame {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 28px;
      height: 60px;
      background: radial-gradient(ellipse at 50% 100%, #fff 0%, #ffe066 20%, #ff9900 50%, #ff4400 75%, transparent 100%);
      border-radius: 50% 50% 30% 30%;
      animation: flicker 0.12s infinite alternate;
      filter: blur(1px);
    }
    .flame::after {
      content: '';
      position: absolute;
      bottom: 4px;
      left: 50%;
      transform: translateX(-50%);
      width: 14px;
      height: 30px;
      background: radial-gradient(ellipse at 50% 100%, #fff 0%, #ffe8a0 40%, transparent 100%);
      border-radius: 50% 50% 30% 30%;
    }

    @keyframes flicker {
      0%   { transform: translateX(-50%) scaleX(1)   scaleY(1)   skewX(0deg); }
      25%  { transform: translateX(-50%) scaleX(0.92) scaleY(1.04) skewX(2deg); }
      50%  { transform: translateX(-50%) scaleX(1.05) scaleY(0.97) skewX(-1deg); }
      75%  { transform: translateX(-50%) scaleX(0.95) scaleY(1.06) skewX(1deg); }
      100% { transform: translateX(-50%) scaleX(1.02) scaleY(1.02) skewX(-2deg); }
    }

    /* 香烟 */
    .cig-wrap {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%) translateY(-30px);
      opacity: 0;
      transition: opacity 0.4s ease, transform 0.4s ease;
      width: 120px;
      height: 180px;
    }
    .cig-wrap.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* 烟体 SVG */
    .cig-svg {
      width: 120px;
      height: 180px;
    }

    /* 烟雾 */
    .smoke-wrap {
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 80px;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    .smoke-wrap.show { opacity: 1; }

    .smoke-particle {
      position: absolute;
      bottom: 0;
      border-radius: 50%;
      background: rgba(200,200,200,0.5);
      animation: rise 2s ease-out infinite;
    }
    .smoke-particle:nth-child(1) { width: 12px; height: 12px; left: 20px; animation-delay: 0s; }
    .smoke-particle:nth-child(2) { width: 16px; height: 16px; left: 30px; animation-delay: 0.4s; }
    .smoke-particle:nth-child(3) { width: 10px; height: 10px; left: 14px; animation-delay: 0.8s; }
    .smoke-particle:nth-child(4) { width: 14px; height: 14px; left: 26px; animation-delay: 1.2s; }

    @keyframes rise {
      0%   { transform: translateY(0) scale(0.5); opacity: 0.6; }
      50%  { transform: translateY(-40px) translateX(8px) scale(1.2); opacity: 0.3; }
      100% { transform: translateY(-80px) translateX(-4px) scale(1.8); opacity: 0; }
    }

    /* 按钮提示 */
    .hint {
      position: fixed;
      bottom: 50px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 13px;
      color: rgba(255,255,255,0.3);
      letter-spacing: 1px;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.7; }
    }

    /* 点击涟漪 */
    .ripple {
      position: fixed;
      border-radius: 50%;
      background: rgba(255, 160, 0, 0.3);
      transform: scale(0);
      animation: ripple-anim 0.6s ease-out forwards;
      pointer-events: none;
    }
    @keyframes ripple-anim {
      to { transform: scale(4); opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="counter-wrap">
    <div class="counter-num" id="count">0</div>
    <div class="counter-label">今日已抽</div>
  </div>

  <div class="stage">
    <!-- 烟雾 -->
    <div class="smoke-wrap" id="smoke">
      <div class="smoke-particle"></div>
      <div class="smoke-particle"></div>
      <div class="smoke-particle"></div>
      <div class="smoke-particle"></div>
    </div>

    <!-- 香烟 -->
    <div class="cig-wrap" id="cig">
      <svg class="cig-svg" viewBox="0 0 120 180" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- 烟体 -->
        <rect x="50" y="30" width="20" height="130" rx="4" fill="url(#cigGrad)"/>
        <!-- 过滤嘴 -->
        <rect x="50" y="140" width="20" height="30" rx="4" fill="#d4956a"/>
        <rect x="50" y="140" width="20" height="4" fill="#c07850"/>
        <!-- 烟纸纹理 -->
        <line x1="50" y1="60" x2="70" y2="60" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
        <line x1="50" y1="80" x2="70" y2="80" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
        <line x1="50" y1="100" x2="70" y2="100" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
        <line x1="50" y1="120" x2="70" y2="120" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
        <!-- 燃烧端 -->
        <ellipse cx="60" cy="32" rx="10" ry="5" fill="#ff6600" id="cig-tip"/>
        <ellipse cx="60" cy="30" rx="8" ry="4" fill="#ff9900"/>
        <ellipse cx="60" cy="29" rx="5" ry="3" fill="#ffcc00"/>
        <defs>
          <linearGradient id="cigGrad" x1="50" y1="0" x2="70" y2="0" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#f0f0f0"/>
            <stop offset="40%" stop-color="#ffffff"/>
            <stop offset="100%" stop-color="#d8d8d8"/>
          </linearGradient>
        </defs>
      </svg>
    </div>

    <!-- 打火机 -->
    <div class="lighter" id="lighter" onclick="ignite(event)">
      <div class="flame-wrap" id="flame">
        <div class="flame"></div>
      </div>
      <div class="lighter-nozzle"></div>
      <div class="lighter-top"></div>
      <div class="lighter-body"></div>
    </div>
  </div>

  <div class="hint" id="hint">点击打火机</div>

  <script>
    const KEY = 'cig_count_today';
    const KEY_DATE = 'cig_count_date';

    function getToday() {
      return new Date().toLocaleDateString('zh-CN');
    }

    function loadCount() {
      const saved = localStorage.getItem(KEY_DATE);
      if (saved !== getToday()) {
        localStorage.setItem(KEY, '0');
        localStorage.setItem(KEY_DATE, getToday());
      }
      return parseInt(localStorage.getItem(KEY) || '0');
    }

    function saveCount(n) {
      localStorage.setItem(KEY, String(n));
      localStorage.setItem(KEY_DATE, getToday());
    }

    let count = loadCount();
    let animating = false;

    const countEl = document.getElementById('count');
    const flameEl = document.getElementById('flame');
    const cigEl = document.getElementById('cig');
    const smokeEl = document.getElementById('smoke');
    const hintEl = document.getElementById('hint');

    countEl.textContent = count;

    function ignite(e) {
      if (animating) return;
      animating = true;

      // 涟漪
      const ripple = document.createElement('div');
      ripple.className = 'ripple';
      const size = 60;
      ripple.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX - size/2}px;top:${e.clientY - size/2}px`;
      document.body.appendChild(ripple);
      setTimeout(() => ripple.remove(), 600);

      hintEl.style.opacity = '0';

      // 1. 点火
      flameEl.classList.add('show');

      // 2. 烟出现
      setTimeout(() => {
        cigEl.classList.add('show');
      }, 400);

      // 3. 烟雾
      setTimeout(() => {
        smokeEl.classList.add('show');
      }, 900);

      // 4. 计数+1
      setTimeout(() => {
        count++;
        saveCount(count);
        countEl.textContent = count;
        countEl.classList.add('bump');
        setTimeout(() => countEl.classList.remove('bump'), 200);
      }, 1000);

      // 5. 收起
      setTimeout(() => {
        flameEl.classList.remove('show');
        cigEl.classList.remove('show');
        smokeEl.classList.remove('show');
        animating = false;
        hintEl.style.opacity = '';
      }, 2800);
    }
  </script>
</body>
</html>
