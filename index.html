<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>点一根</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0f;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
      overflow: hidden;
      user-select: none;
    }

    /* 计数器 */
    .counter-wrap {
      position: fixed;
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
    }
    .counter-num {
      font-size: 72px;
      font-weight: 700;
      color: #fff;
      line-height: 1;
      transition: transform 0.15s ease;
    }
    .counter-num.bump { transform: scale(1.3); }
    .counter-label {
      font-size: 14px;
      color: rgba(255,255,255,0.4);
      margin-top: 4px;
      letter-spacing: 2px;
    }

    /* 主舞台 */
    .stage {
      position: relative;
      width: 280px;
      height: 320px;
      margin-top: 20px;
    }

    /* 打火机 — 居中偏左下 */
    .lighter {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-60%);
      width: 70px;
      height: 130px;
      cursor: pointer;
    }
    .lighter:active .lighter-body { filter: brightness(1.1); }

    .lighter-body {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 56px;
      height: 100px;
      background: linear-gradient(160deg, #e8c84a 0%, #c9a020 40%, #a07810 100%);
      border-radius: 10px 10px 14px 14px;
      box-shadow: inset -4px 0 8px rgba(0,0,0,0.3), 0 4px 20px rgba(0,0,0,0.5);
    }
    .lighter-body::after {
      content: '';
      position: absolute;
      top: 10px; left: 7px; right: 7px; height: 26px;
      background: rgba(255,255,255,0.12);
      border-radius: 5px;
    }
    .lighter-top {
      position: absolute;
      bottom: 98px;
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      height: 20px;
      background: linear-gradient(180deg, #888 0%, #555 100%);
      border-radius: 4px 4px 0 0;
    }
    .lighter-nozzle {
      position: absolute;
      bottom: 116px;
      left: 50%;
      transform: translateX(-50%);
      width: 12px;
      height: 10px;
      background: #333;
      border-radius: 3px 3px 0 0;
    }

    /* 火焰 — 在喷嘴上方 */
    .flame-wrap {
      position: absolute;
      bottom: 124px;
      left: 50%;
      transform: translateX(-50%);
      width: 36px;
      height: 60px;
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    .flame-wrap.show { opacity: 1; }

    .flame {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 26px;
      height: 54px;
      background: radial-gradient(ellipse at 50% 100%, #fff 0%, #ffe066 20%, #ff9900 50%, #ff4400 80%, transparent 100%);
      border-radius: 50% 50% 30% 30%;
      animation: flicker 0.1s infinite alternate;
      filter: blur(0.5px);
    }
    .flame::after {
      content: '';
      position: absolute;
      bottom: 4px; left: 50%;
      transform: translateX(-50%);
      width: 12px; height: 26px;
      background: radial-gradient(ellipse at 50% 100%, #fff 0%, #ffe8a0 50%, transparent 100%);
      border-radius: 50% 50% 30% 30%;
    }
    @keyframes flicker {
      0%   { transform: translateX(-50%) scaleX(1)    scaleY(1)    skewX(0deg); }
      33%  { transform: translateX(-50%) scaleX(0.9)  scaleY(1.05) skewX(3deg); }
      66%  { transform: translateX(-50%) scaleX(1.06) scaleY(0.96) skewX(-2deg); }
      100% { transform: translateX(-50%) scaleX(0.95) scaleY(1.04) skewX(1deg); }
    }

    /* 香烟 — 斜着，烟头朝左下对接火焰 */
    /*
      烟从右上角飞入，旋转约 -35deg（右高左低），
      烟头（左端）最终停在火焰顶部附近
    */
    .cig-wrap {
      position: absolute;
      /* 最终位置：烟头对准火焰 */
      bottom: 148px;
      left: 50%;
      transform-origin: left center;
      /* 初始：右上角外 */
      transform: translateX(60px) translateY(-80px) rotate(-35deg);
      opacity: 0;
      transition: transform 0.55s cubic-bezier(0.22,1,0.36,1), opacity 0.4s ease;
      width: 200px;
      height: 22px;
      pointer-events: none;
    }
    .cig-wrap.show {
      opacity: 1;
      transform: translateX(-20px) translateY(0px) rotate(-35deg);
    }

    /* 烟体 SVG，横向，左=烟头，右=滤嘴 */
    .cig-svg {
      width: 200px;
      height: 22px;
    }

    /* 烟雾 — 从烟头位置飘出 */
    .smoke-wrap {
      position: absolute;
      bottom: 168px;
      left: calc(50% - 36px);
      width: 40px;
      height: 70px;
      opacity: 0;
      transition: opacity 0.5s ease;
      pointer-events: none;
    }
    .smoke-wrap.show { opacity: 1; }

    .sp {
      position: absolute;
      bottom: 0;
      border-radius: 50%;
      background: rgba(200,200,200,0.45);
      animation: rise 2.2s ease-out infinite;
    }
    .sp:nth-child(1) { width: 10px; height: 10px; left: 10px; animation-delay: 0s; }
    .sp:nth-child(2) { width: 14px; height: 14px; left: 18px; animation-delay: 0.5s; }
    .sp:nth-child(3) { width: 9px;  height: 9px;  left: 6px;  animation-delay: 1s; }
    .sp:nth-child(4) { width: 12px; height: 12px; left: 22px; animation-delay: 1.5s; }

    @keyframes rise {
      0%   { transform: translateY(0) scale(0.5); opacity: 0.6; }
      50%  { transform: translateY(-35px) translateX(6px) scale(1.3); opacity: 0.3; }
      100% { transform: translateY(-70px) translateX(-4px) scale(2); opacity: 0; }
    }

    /* 提示 */
    .hint {
      position: fixed;
      bottom: 44px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 13px;
      color: rgba(255,255,255,0.3);
      letter-spacing: 1px;
      animation: pulse 2s ease-in-out infinite;
      white-space: nowrap;
    }
    @keyframes pulse {
      0%,100% { opacity: 0.3; }
      50% { opacity: 0.7; }
    }

    /* 涟漪 */
    .ripple {
      position: fixed;
      border-radius: 50%;
      background: rgba(255,160,0,0.25);
      transform: scale(0);
      animation: rpl 0.6s ease-out forwards;
      pointer-events: none;
    }
    @keyframes rpl { to { transform: scale(5); opacity: 0; } }
  </style>
</head>
<body>

  <div class="counter-wrap">
    <div class="counter-num" id="count">0</div>
    <div class="counter-label">今日已抽</div>
  </div>

  <div class="stage">

    <!-- 烟雾（烟头位置） -->
    <div class="smoke-wrap" id="smoke">
      <div class="sp"></div><div class="sp"></div>
      <div class="sp"></div><div class="sp"></div>
    </div>

    <!-- 香烟（横向，左=烟头，右=滤嘴，整体旋转-35deg） -->
    <div class="cig-wrap" id="cig">
      <svg class="cig-svg" viewBox="0 0 200 22" xmlns="http://www.w3.org/2000/svg">
        <!-- 燃烧端（最左） -->
        <ellipse cx="6" cy="11" rx="6" ry="7" fill="#ff6600"/>
        <ellipse cx="7" cy="11" rx="4" ry="5" fill="#ff9900"/>
        <ellipse cx="8" cy="11" rx="2.5" ry="3" fill="#ffcc00"/>
        <!-- 烟体（白色纸） -->
        <rect x="12" y="4" width="148" height="14" rx="3" fill="url(#cg)"/>
        <!-- 纸纹 -->
        <line x1="50"  y1="4" x2="50"  y2="18" stroke="rgba(0,0,0,0.07)" stroke-width="0.8"/>
        <line x1="90"  y1="4" x2="90"  y2="18" stroke="rgba(0,0,0,0.07)" stroke-width="0.8"/>
        <line x1="130" y1="4" x2="130" y2="18" stroke="rgba(0,0,0,0.07)" stroke-width="0.8"/>
        <!-- 滤嘴（右端） -->
        <rect x="160" y="4" width="36" height="14" rx="3" fill="#d4956a"/>
        <rect x="160" y="4" width="3"  height="14" fill="#c07850"/>
        <!-- 高光 -->
        <rect x="12" y="5" width="148" height="3" rx="1.5" fill="rgba(255,255,255,0.35)"/>
        <defs>
          <linearGradient id="cg" x1="0" y1="0" x2="0" y2="22" gradientUnits="userSpaceOnUse">
            <stop offset="0%"   stop-color="#f8f8f8"/>
            <stop offset="50%"  stop-color="#ffffff"/>
            <stop offset="100%" stop-color="#d0d0d0"/>
          </linearGradient>
        </defs>
      </svg>
    </div>

    <!-- 打火机 -->
    <div class="lighter" id="lighter" onclick="ignite(event)">
      <div class="flame-wrap" id="flame">
        <div class="flame"></div>
      </div>
      <div class="lighter-nozzle"></div>
      <div class="lighter-top"></div>
      <div class="lighter-body"></div>
    </div>

  </div>

  <div class="hint" id="hint">点击打火机</div>

  <script>
    const KEY = 'cig_count_v2';
    const KEY_DATE = 'cig_date_v2';

    function getToday() {
      return new Date().toLocaleDateString('zh-CN');
    }
    function loadCount() {
      if (localStorage.getItem(KEY_DATE) !== getToday()) {
        localStorage.setItem(KEY, '0');
        localStorage.setItem(KEY_DATE, getToday());
      }
      return parseInt(localStorage.getItem(KEY) || '0');
    }
    function saveCount(n) {
      localStorage.setItem(KEY, String(n));
      localStorage.setItem(KEY_DATE, getToday());
    }

    let count = loadCount();
    let animating = false;

    const countEl = document.getElementById('count');
    const flameEl = document.getElementById('flame');
    const cigEl   = document.getElementById('cig');
    const smokeEl = document.getElementById('smoke');
    const hintEl  = document.getElementById('hint');

    countEl.textContent = count;

    function ignite(e) {
      if (animating) return;
      animating = true;
      hintEl.style.opacity = '0';

      // 涟漪
      const r = document.createElement('div');
      r.className = 'ripple';
      const s = 60;
      r.style.cssText = `width:${s}px;height:${s}px;left:${e.clientX-s/2}px;top:${e.clientY-s/2}px`;
      document.body.appendChild(r);
      setTimeout(() => r.remove(), 700);

      // 1. 点火
      flameEl.classList.add('show');

      // 2. 烟从右上角滑入
      setTimeout(() => cigEl.classList.add('show'), 300);

      // 3. 烟雾
      setTimeout(() => smokeEl.classList.add('show'), 850);

      // 4. 计数
      setTimeout(() => {
        count++;
        saveCount(count);
        countEl.textContent = count;
        countEl.classList.add('bump');
        setTimeout(() => countEl.classList.remove('bump'), 200);
      }, 950);

      // 5. 收起
      setTimeout(() => {
        flameEl.classList.remove('show');
        cigEl.classList.remove('show');
        smokeEl.classList.remove('show');
        animating = false;
        hintEl.style.opacity = '';
      }, 3000);
    }
  </script>
</body>
</html>
